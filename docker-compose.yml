# docker-compose.yml
# Self-hosted deployment: FastAPI backend + Qdrant on one server.
# Usage:
#   docker compose up -d            # start everything
#   docker compose logs -f api      # stream API logs
#   docker compose down             # stop

version: "3.9"

services:

  # ── Qdrant Vector Database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: news_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage   # persistent vector data
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news_api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/local_store   # persistent SQLite DB
      - hf_cache:/root/.cache/huggingface   # cache model weights between restarts
    environment:
      # Qdrant — points to the sibling container
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ""

      # Model
      MODEL_NAME: BAAI/bge-m3
      RANKER_WEIGHTS_PATH: ranker_weights.pt

      # Stores
      SQLITE_DB_PATH: local_store/news.db
      COLLECTION_NAME: news_embeddings

      # Performance
      CACHE_MAX_SIZE: 1000
      INGEST_BATCH_SIZE: 16

      # Suppress TF
      TRANSFORMERS_NO_TF: "1"
      TF_CPP_MIN_LOG_LEVEL: "3"
      TOKENIZERS_PARALLELISM: "false"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # give time for model to load

volumes:
  qdrant_data:
  sqlite_data:
  hf_cache:
