# render.yaml
# One-click deployment configuration for Render.com
# Docs: https://render.com/docs/yaml-spec
#
# This deploys the FastAPI backend as a Web Service.
# The frontend is deployed separately on Vercel (it's just a Next.js app).
#
# Free tier uses BAAI/bge-small-en-v1.5 (384-dim, ~150MB RAM).
# Upgrade MODEL_NAME to BAAI/bge-m3 if you move to a paid plan (2GB+ RAM).
databases:
  - name: news-postgressDB
    databaseName: news_db_27kk
    user: news_user
    plan: free


services:
  - type: web
    name: news-recommendation-api
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install --upgrade pip && pip install -r ./app/requirements.txt

    # PYTHONPATH=. is set inline so local_store module is always found
    startCommand: PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # Render sets $PORT automatically — do NOT hardcode 8000 here
    healthCheckPath: /api/v1/health

    envVars:
      # ── Qdrant (embedded local mode — no cloud server needed) ──────────────
      - key: QDRANT_HOST
        value: local
      - key: QDRANT_PORT
        value: "6333"
      - key: QDRANT_API_KEY
        value: ""

      # ── Collection ──────────────────────────────────────────────────────────
      - key: COLLECTION_NAME
        value: news_embeddings

      # ── Model ───────────────────────────────────────────────────────────────
      # Free tier (512MB RAM): use bge-small-en-v1.5 (384-dim, ~150MB RAM)
      - key: MODEL_NAME
        value: BAAI/bge-small-en-v1.5
      - key: RANKER_WEIGHTS_PATH
        value: ranker_weights.pt

      # ── Storage ─────────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: news-postgressDB
          property: connectionString

      # ── Performance ─────────────────────────────────────────────────────────
      - key: CACHE_MAX_SIZE
        value: "200"
      - key: INGEST_BATCH_SIZE
        value: "8"

      # ── Suppress TF/Keras ───────────────────────────────────────────────────
      - key: TRANSFORMERS_NO_TF
        value: "1"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
      - key: TOKENIZERS_PARALLELISM
        value: "false"

      # ── Python path (also set inline in startCommand as backup) ─────────────
      - key: PYTHONPATH
        value: "."
